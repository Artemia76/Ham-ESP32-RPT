<!DOCTYPE html>
<html lang="fr">
	<head>
		<title>Administration du relais F5ZEV</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta charset="UTF-8">
		<link rel="stylesheet" type="text/css" href="w3.css">
		<link rel="stylesheet" type="text/css" href="custom.css">
		<script src="script.js" defer></script>
	</head>
	<body>
		<div class="header-container">
			<div class="header-title">
				<h1>F5ZEV-SHTSF</h1>
				<p>ADMIN SETTINGS</p>
			</div>
			<div class="header-buttons">
				<button class="green-button" id="TestBtn" type="button">Test</button>
				<button class="red-button" id="RstBtn" type="button">Restart</button>
			</div>
		</div>
		<div class="main-content">
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-half">
					<h2>Service Mode</h2>
				</div>
				<div class="w3-half">
					<h2>
						<label class="switch">
							<input id="RepControl" type="checkbox">
							<span class="slider round"></span>
						</label>
					</h2>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>RSSI Level</h2>
				</div>
				<div class="w3-twothird">
					<label id="RSSIValue">0 dBm</label>
					<div class="meter-container">
						<meter id="RSSIJauge" value="1" min="1" max="13"></meter>
						<div class="meterline"></div>
						<!-- Ligne verticale fixée -->
					</div>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>Squelch Level</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="1" max="13" value="9" class="slider2" id="SqlControl">
					<p>Value:
						<span id="SqlValue"></span></p>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>1750Hz Level</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="0" max="100" value="30" class="slider2" id="MagControl">
					<p>Value:
						<span id="MagValue"></span></p>
				</div>
			</div>
		</div>
    	<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>Timeout Timer (TOT)</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="0" max="600" value="180" class="slider2" id="TOTControl">
					<p>Value:
						<span id="TOTValue"></span></p>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>Start Announce Volume Level</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="0" max="100" value="80" class="slider2" id="StartVolume">
					<p>Value:
						<span id="StartValue"></span></p>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>Roger Beep Volume Level</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="0" max="100" value="80" class="slider2" id="RBVolume">
					<p>Value:
						<span id="RBValue"></span></p>
				</div>
			</div>
		</div>
		<div class="w3-container w3-card-4 w3-grey">
			<div class="w3-row-padding">
				<div class="w3-third">
					<h2>End Announce Volume Level</h2>
				</div>
				<div class="w3-twothird">
					<input type="range" min="0" max="100" value="80" class="slider2" id="EndVolume">
					<p>Value:
						<span id="EndValue"></span></p>
				</div>
			</div>
		</div>
		</div>
	</body>
</html>
